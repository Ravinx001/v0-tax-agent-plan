# Slack App Manifest for AutoTaxBot
# Use this to create your Slack app at https://api.slack.com/apps
#
# Instructions:
# 1. Deploy your app to Vercel first
# 2. Replace YOUR_DOMAIN with your actual Vercel deployment URL
# 3. Go to https://api.slack.com/apps → Create New App → From a manifest
# 4. Paste this YAML and create the app
# 5. Install to your workspace
# 6. Copy Bot Token (xoxb-...) and Signing Secret to Vercel env vars

display_information:
  name: TaxBot LK
  description: Sri Lankan vehicle import tax calculator - Get instant tax estimates for cars, SUVs, and more
  background_color: "#1e3a5f"
  long_description: |
    TaxBot LK helps you calculate import duties and taxes for vehicles being imported to Sri Lanka.

    Features:
    - Calculate customs duty, excise duty, VAT, PAL, and SSL
    - Compare taxes across fuel types (petrol, diesel, hybrid, electric)
    - Get rate information from the 2025 Gazette
    - Works with all vehicle types: cars, SUVs, trucks

    Simply @mention TaxBot LK in any channel or DM and ask about your vehicle import!

features:
  bot_user:
    display_name: TaxBot LK
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    # Replace YOUR_DOMAIN with your Vercel deployment URL
    request_url: https://YOUR_DOMAIN/api/webhooks/slack
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
      - reaction_removed
  interactivity:
    is_enabled: true
    # Replace YOUR_DOMAIN with your Vercel deployment URL
    request_url: https://YOUR_DOMAIN/api/webhooks/slack
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
